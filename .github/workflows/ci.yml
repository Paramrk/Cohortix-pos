name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pos:
    name: POS App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  customer:
    name: Customer App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nilkanth-ice-dish-gola
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nilkanth-ice-dish-gola/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
